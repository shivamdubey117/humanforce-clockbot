name: ClockBot - Clock Out (10:00 PM IST)

on:
  schedule:
    - cron: '30 16 * * 1-5'
  workflow_dispatch:

jobs:
  clock-out:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run Clock Out
        env:
          HF_EMPLOYEE_CODE: ${{ secrets.HF_EMPLOYEE_CODE }}
          HF_PASSWORD: ${{ secrets.HF_PASSWORD }}
          CLOCK_ACTION: clock_out
        run: python clockbot_actions.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: clock-out-screenshot
          path: screenshots/
          retention-days: 7