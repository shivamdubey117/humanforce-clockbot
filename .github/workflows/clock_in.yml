name: ClockBot - Clock In

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1-5'

jobs:
  clock-in:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - run: python clockbot_actions.py
        env:
          HF_EMPLOYEE_CODE: ${{ secrets.HF_EMPLOYEE_CODE }}
          HF_PASSWORD: ${{ secrets.HF_PASSWORD }}
          CLOCK_ACTION: clock_in
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: screenshot
          path: screenshots/
