name: ClockBot - Clock In (10:00 AM IST)

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  clock-in:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Create team members file
        env:
          TEAM_MEMBERS_JSON: ${{ secrets.TEAM_MEMBERS_JSON }}
        run: |
          if [ -n "$TEAM_MEMBERS_JSON" ]; then
            echo "$TEAM_MEMBERS_JSON" > team_members.json
          fi

      - name: Run Clock In for all team members
        env:
          CLOCK_ACTION: clock_in
          TZ: Asia/Kolkata
        run: python clockbot_actions.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clock-in-screenshots
          path: screenshots/
          retention-days: 7
